name: Build and deploy AYAS OS apt repository

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils

      - name: Build example Debian packages
        run: |
          mkdir -p examples/ayas-app-1.0.0/DEBIAN examples/ayas-app-1.0.0/usr/bin examples/ayas-app-1.1.0/DEBIAN examples/ayas-app-1.1.0/usr/bin
          cat > examples/ayas-app-1.0.0/DEBIAN/control <<'EOF'
          Package: ayas-app
          Version: 1.0.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: AYAS OS <info@example.com>
          Description: AYAS OS sample application
          EOF
          cat > examples/ayas-app-1.0.0/usr/bin/ayas-app <<'EOF'
          #!/bin/sh
          echo "AYAS app 1.0.0"
          EOF
          chmod 755 examples/ayas-app-1.0.0/usr/bin/ayas-app
          cat > examples/ayas-app-1.1.0/DEBIAN/control <<'EOF'
          Package: ayas-app
          Version: 1.1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: AYAS OS <info@example.com>
          Description: AYAS OS sample application
          EOF
          cat > examples/ayas-app-1.1.0/usr/bin/ayas-app <<'EOF'
          #!/bin/sh
          echo "AYAS app 1.1.0"
          EOF
          chmod 755 examples/ayas-app-1.1.0/usr/bin/ayas-app
          dpkg-deb --build examples/ayas-app-1.0.0 examples/ayas-app_1.0.0_amd64.deb
          dpkg-deb --build examples/ayas-app-1.1.0 examples/ayas-app_1.1.0_amd64.deb

      - name: Build apt repository
        run: |
          chmod +x scripts/build_repo.sh
          ./scripts/build_repo.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
